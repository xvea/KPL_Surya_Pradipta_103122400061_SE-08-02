<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guthib</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- Tag main adalah tag semantic HTML yang menandai konten utama halaman -->
    <!-- Tag ini membantu mesin pencari/crawler memahami struktur konten -->
    <main>
      <h1>Pengkonversi Gaya Teks</h1>
      <p>
        Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan
        paragraf.
      </p>
      <label for="editor-kecil">Masukkan teks:</label>
      <textarea
        class="kotak-input"
        id="editor-kecil"
        rows="10"
        cols="60"
        placeholder="Kata-kata..."
      ></textarea>
      <p>
        Huruf: <span id="hf">0</span>, huruf besar: <span id="hb">0</span>,
        huruf kecil: <span id="hk">0</span>
      </p>
      <div>
        <button id="huruf-besar">Besarkan</button>
        <button id="huruf-kecil">Kecilkan</button>
        <button id="huruf-paragraf">Paragrafkan</button>
      </div>
    </main>
    <!-- Berkas JS -->
    <script src="./index.js"></script>
  </body>
</html>
