<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guthib - Pengkonversi Gaya Teks</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Guthib</h1>
    <h2>Pengkonversi Gaya Teks</h2>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

    <label for="editor-kecil">Masukkan teks:</label>
    <textarea id="editor-kecil" class="kotak-input" rows="10" cols="50"></textarea>

    <p>
        Huruf: <span id="hf">0</span>, 
        huruf besar: <span id="hb">0</span>, 
        huruf kecil: <span id="hk">0</span>
    </p>

    <div class="action-buttons">
        <button id="huruf-besar">Besarkan</button>
        <button id="huruf-kecil">Kecilkan</button>
        <button id="huruf-paragraf">Paragrafkan</button>
    </div>

    <div class="mode-div">
        <button id="tombol-terang">Mode Terang</button>
        <button id="tombol-gelap">Mode Gelap</button>
        <button id="tombol-sepia">Mode Sepia</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
